<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحبني؟ ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink-light:#ffb3c6;--pink:#ff69b4;--pink-deep:#e91e8c;
  --red:#e8274b;--red-dark:#c0143c;--cream:#fff0f5;
  --shadow:rgba(233,30,140,.3);
}
*{margin:0;padding:0;box-sizing:border-box}

/* ── Animated gradient background ── */
body{
  font-family:'Tajawal',sans-serif;
  background:linear-gradient(135deg,#ffe0ec,#ffc2d4,#ffb3c6,#ff85a1,#ffaec9,#ffe0ec);
  background-size:400% 400%;
  animation:bgShift 12s ease infinite;
  min-height:100vh;overflow-x:hidden;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
@keyframes bgShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(255,105,180,.38) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 80%,rgba(232,39,75,.32) 0%,transparent 55%),
             radial-gradient(ellipse at 60% 10%,rgba(255,179,198,.42) 0%,transparent 45%);
  pointer-events:none;z-index:0;
  animation:meshPulse 8s ease-in-out infinite;
}
@keyframes meshPulse{
  0%,100%{opacity:1}50%{opacity:.7}
}

/* ── Glowing particles canvas layer ── */
#particles-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  animation:particleDrift linear infinite;
  pointer-events:none;
}
@keyframes particleDrift{
  0%{transform:translateY(0) translateX(0) scale(1);opacity:0}
  15%{opacity:1}
  85%{opacity:.6}
  100%{transform:translateY(-100vh) translateX(var(--drift)) scale(.4);opacity:0}
}

#hearts-bg{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.bg-heart{
  position:absolute;bottom:-60px;
  animation:floatUp linear infinite;opacity:0;
  filter:drop-shadow(0 0 6px rgba(255,100,150,.55));
  will-change:transform;
}
@keyframes floatUp{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:0}
  8%{opacity:.8}88%{opacity:.45}
  100%{transform:translateY(-115vh) rotate(30deg) scale(.5);opacity:0}
}

/* ── Music button ── */
#music-btn{
  position:fixed;top:16px;left:16px;z-index:100;
  background:rgba(255,255,255,.88);border:2px solid var(--pink);
  border-radius:50px;padding:8px 18px;font-family:'Tajawal',sans-serif;
  font-size:.95rem;font-weight:700;color:var(--pink-deep);cursor:pointer;
  backdrop-filter:blur(8px);transition:all .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px var(--shadow),0 0 0 0 rgba(233,30,140,.4);
}
#music-btn:hover{
  background:var(--pink);color:#fff;transform:scale(1.08);
  box-shadow:0 8px 28px var(--shadow);
}
#music-btn.playing{
  animation:musicPulse 2s ease-in-out infinite;
  background:var(--pink);color:#fff;
}
@keyframes musicPulse{
  0%,100%{box-shadow:0 4px 20px var(--shadow),0 0 0 0 rgba(233,30,140,.5)}
  50%{box-shadow:0 4px 20px var(--shadow),0 0 0 10px rgba(233,30,140,0)}
}

/* ── No counter badge ── */
#no-counter{
  position:fixed;top:16px;right:16px;z-index:100;
  background:rgba(255,255,255,.88);border:2px solid var(--red);
  border-radius:50px;padding:7px 16px;font-family:'Tajawal',sans-serif;
  font-size:.88rem;font-weight:700;color:var(--red);
  backdrop-filter:blur(8px);transition:all .4s;
  box-shadow:0 4px 16px rgba(232,39,75,.25);
  opacity:0;transform:scale(.8);
}
#no-counter.visible{opacity:1;transform:scale(1)}

/* ── Welcome back banner ── */
#welcome-back{
  position:fixed;top:0;left:0;right:0;z-index:500;
  background:linear-gradient(135deg,var(--pink-deep),var(--red));
  color:#fff;font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:700;
  text-align:center;padding:14px 20px;
  transform:translateY(-100%);transition:transform .6s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px var(--shadow);letter-spacing:.02em;
}
#welcome-back.show{transform:translateY(0)}

/* ── Card ── */
#card{
  position:relative;z-index:10;
  background:rgba(255,255,255,.8);backdrop-filter:blur(22px);
  border-radius:32px;padding:40px 40px 38px;max-width:480px;width:92%;
  text-align:center;
  box-shadow:
    0 8px 40px rgba(233,30,140,.22),
    0 0 0 1px rgba(255,150,180,.3) inset,
    0 0 60px rgba(255,105,180,.08);
  transition:box-shadow .5s;
  animation:cardEntrance .8s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardEntrance{
  from{opacity:0;transform:translateY(30px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
#card:hover{
  box-shadow:0 12px 50px rgba(233,30,140,.3),0 0 0 1px rgba(255,150,180,.4) inset,0 0 80px rgba(255,105,180,.12);
}

/* ── Bear container & glow ── */
#bear-container{
  position:relative;display:inline-block;
  margin-bottom:20px;cursor:default;user-select:none;
}
#bear-container::after{
  content:'';position:absolute;inset:-16px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,105,180,.18) 0%,transparent 70%);
  animation:bearGlow 3s ease-in-out infinite;
  pointer-events:none;z-index:-1;
}
@keyframes bearGlow{
  0%,100%{transform:scale(1);opacity:.8}
  50%{transform:scale(1.12);opacity:1}
}

#bear-svg{
  width:200px;height:200px;display:block;margin:0 auto;
  filter:drop-shadow(0 8px 24px rgba(160,80,60,.22)) drop-shadow(0 0 16px rgba(255,150,100,.15));
  transform-origin:50% 90%;
  animation:bearBreathe 4s ease-in-out infinite;
}
@keyframes bearBreathe{
  0%,100%{transform:scale(1) translateY(0)}
  40%{transform:scale(1.025) translateY(-2px)}
  60%{transform:scale(1.015) translateY(-1px)}
}
#bear-svg.shake{animation:bearShake .55s cubic-bezier(.36,.07,.19,.97) both}
#bear-svg.jump{animation:bearJump .7s cubic-bezier(.34,1.56,.64,1) forwards}
#bear-svg.sad-tilt{animation:sadTilt .45s cubic-bezier(.34,1.56,.64,1) forwards}
#bear-svg.mega-happy{animation:megaHappy .8s cubic-bezier(.34,1.56,.64,1) forwards}

@keyframes bearShake{
  0%,100%{transform:translateX(0) rotate(0)}
  12%{transform:translateX(-11px) rotate(-8deg)}
  25%{transform:translateX(11px) rotate(8deg)}
  37%{transform:translateX(-8px) rotate(-5deg)}
  50%{transform:translateX(8px) rotate(5deg)}
  62%{transform:translateX(-5px) rotate(-3deg)}
  75%{transform:translateX(5px) rotate(3deg)}
  87%{transform:translateX(-2px) rotate(-1deg)}
}
@keyframes bearJump{
  0%{transform:translateY(0) scale(1) rotate(0)}
  22%{transform:translateY(-40px) scale(1.12) rotate(-7deg)}
  44%{transform:translateY(-58px) scale(1.2) rotate(7deg)}
  65%{transform:translateY(-24px) scale(1.09) rotate(-2deg)}
  82%{transform:translateY(-9px) scale(1.04) rotate(1deg)}
  100%{transform:translateY(0) scale(1.05) rotate(0)}
}
@keyframes sadTilt{to{transform:rotate(-8deg) translateX(-5px) translateY(4px)}}
@keyframes megaHappy{
  0%{transform:scale(1) rotate(0)}
  20%{transform:scale(1.22) rotate(-10deg)}
  40%{transform:scale(1.28) rotate(10deg)}
  60%{transform:scale(1.18) rotate(-5deg)}
  80%{transform:scale(1.12) rotate(3deg)}
  100%{transform:scale(1.06) rotate(0)}
}

/* Bear SVG internal animations */
.bear-eye-shine{animation:eyeShine 3.5s ease-in-out infinite}
@keyframes eyeShine{0%,75%,100%{opacity:1}80%{opacity:0}83%{opacity:1}88%{opacity:0}}

#bear-blink{animation:bearBlink 5s ease-in-out infinite}
@keyframes bearBlink{
  0%,90%,100%{transform:scaleY(1)}
  93%{transform:scaleY(.08)}
  96%{transform:scaleY(1)}
  98%{transform:scaleY(.08)}
}

#tear-l,#tear-r{opacity:0}
#tear-l.show,#tear-r.show{
  opacity:1;
  animation:tearDrop 1.6s ease-in infinite;
}
#tear-r.show{animation-delay:.55s}
@keyframes tearDrop{
  0%{transform:translateY(0) scaleY(1);opacity:0}
  18%{opacity:1}
  80%{transform:translateY(22px) scaleY(1.4);opacity:.7}
  100%{transform:translateY(28px) scaleY(.5);opacity:0}
}
#heart-l,#heart-r,#heart-t{opacity:0;transform:scale(0)}
#heart-l.show,#heart-r.show,#heart-t.show{
  opacity:1;transform:scale(1);
  animation:heartPop .5s cubic-bezier(.34,1.56,.64,1) forwards,heartFloat 1.9s ease-in-out .5s infinite;
}
@keyframes heartPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
@keyframes heartFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-9px) scale(1.12)}}

#extra-hearts{opacity:0;transition:opacity .4s}
#extra-hearts.show{opacity:1}

@keyframes sparklePop{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.45)}}

/* ── Question pulse ── */
#question{
  font-size:2rem;font-weight:900;color:var(--red);
  margin-bottom:24px;text-shadow:0 2px 12px rgba(200,20,60,.22);
  animation:questionPulse 2.5s ease-in-out infinite;
}
@keyframes questionPulse{
  0%,100%{text-shadow:0 2px 12px rgba(200,20,60,.22)}
  50%{text-shadow:0 2px 22px rgba(232,39,75,.55),0 0 40px rgba(232,39,75,.18)}
}

/* ── Buttons ── */
#btns{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap}
.btn{
  font-family:'Tajawal',sans-serif;font-weight:800;border:none;
  border-radius:50px;cursor:pointer;white-space:nowrap;line-height:1.2;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),
             font-size .38s cubic-bezier(.34,1.56,.64,1),
             box-shadow .28s,padding .38s cubic-bezier(.34,1.56,.64,1),
             opacity .4s;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:rgba(255,255,255,0);transition:background .2s;
}
.btn:active::after{background:rgba(255,255,255,.18)}

#yes-btn{
  font-size:1.15rem;padding:14px 32px;
  background:linear-gradient(135deg,var(--pink-deep),var(--red));
  color:#fff;box-shadow:0 6px 24px rgba(233,30,140,.42);
  animation:yesGlow 2.8s ease-in-out infinite;
}
@keyframes yesGlow{
  0%,100%{box-shadow:0 6px 24px rgba(233,30,140,.42)}
  50%{box-shadow:0 8px 32px rgba(233,30,140,.7),0 0 0 4px rgba(233,30,140,.1)}
}
#yes-btn:hover{
  transform:scale(1.1);
  box-shadow:0 12px 36px rgba(233,30,140,.6);
}
#no-btn{
  font-size:1.15rem;padding:14px 28px;
  background:linear-gradient(135deg,#b0b0b0,#888);
  color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);
}
#no-btn:hover{transform:scale(1.05);filter:brightness(1.08)}
#no-btn:active{transform:scale(.96)}

/* ── Sub message ── */
#sub-msg{
  font-size:1.1rem;font-weight:700;color:var(--pink-deep);
  margin-top:18px;min-height:1.6em;
  transition:opacity .32s,transform .32s;
  transform:translateY(0);
}
#sub-msg.fade-out{opacity:0;transform:translateY(-8px)}
#sub-msg.fade-in{opacity:1;transform:translateY(0)}

/* ── Sad burst ── */
.sad-burst{position:fixed;font-size:1.9rem;pointer-events:none;z-index:200;animation:sadFly 1.3s ease-out forwards}
@keyframes sadFly{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.35) rotate(var(--rot))}
}

/* ── Confetti ── */
.confetti{
  position:fixed;pointer-events:none;z-index:300;
  animation:confettiFall var(--dur) var(--ease) forwards;
}
@keyframes confettiFall{
  0%{transform:translate(0,0) rotate(0) scale(1);opacity:1}
  100%{transform:translate(var(--cx),var(--cy)) rotate(var(--rot)) scale(.6);opacity:0}
}

/* ── Heart burst ── */
.heart-burst{position:fixed;pointer-events:none;z-index:300;animation:heartBurst 1.5s ease-out forwards}
@keyframes heartBurst{
  0%{opacity:1;transform:translate(0,0) scale(.5)}
  30%{opacity:1;transform:translate(calc(var(--hx)*.4),calc(var(--hy)*.4)) scale(1.2)}
  100%{opacity:0;transform:translate(var(--hx),var(--hy)) scale(.7)}
}

/* ── Ring pulse on yes ── */
.ring-pulse{
  position:fixed;border-radius:50%;border:3px solid rgba(233,30,140,.6);
  pointer-events:none;z-index:299;
  animation:ringExpand .9s ease-out forwards;
}
@keyframes ringExpand{
  from{transform:translate(-50%,-50%) scale(0);opacity:1}
  to{transform:translate(-50%,-50%) scale(6);opacity:0}
}

/* ── Final screen ── */
#final-screen{
  display:none;position:fixed;inset:0;z-index:400;
  background:linear-gradient(135deg,#ff1a6e 0%,#ff6fa8 50%,#ffb3ce 100%);
  background-size:300% 300%;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;overflow:hidden;
}
#final-screen.show{
  display:flex;
  animation:fadeInScale .85s cubic-bezier(.34,1.56,.64,1),bgShift 8s ease infinite .9s;
}
@keyframes fadeInScale{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}

#final-bear-svg{
  width:180px;height:180px;
  animation:finalBounce 1s cubic-bezier(.34,1.56,.64,1) forwards;
  filter:drop-shadow(0 12px 32px rgba(0,0,0,.22));
}
@keyframes finalBounce{
  0%{transform:scale(0) rotate(-22deg);opacity:0}
  55%{transform:scale(1.22) rotate(9deg);opacity:1}
  75%{transform:scale(.93) rotate(-3deg)}
  90%{transform:scale(1.06) rotate(1deg)}
  100%{transform:scale(1.04) rotate(0);opacity:1}
}
/* Continuous bounce after entrance */
#final-bear-svg.bouncing{animation:finalBounce 1s cubic-bezier(.34,1.56,.64,1) forwards,finalIdleBounce 2.4s ease-in-out 1.1s infinite}
@keyframes finalIdleBounce{
  0%,100%{transform:scale(1.04) translateY(0)}
  50%{transform:scale(1.06) translateY(-10px)}
}

#final-msg{
  background:rgba(255,255,255,.27);backdrop-filter:blur(14px);
  border-radius:24px;padding:28px 36px;margin-top:20px;max-width:400px;
  border:2px solid rgba(255,255,255,.42);
  animation:slideUp .9s .42s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes slideUp{from{transform:translateY(44px);opacity:0}to{transform:translateY(0);opacity:1}}
#final-msg p{font-size:1.2rem;font-weight:700;color:#fff;line-height:2;text-shadow:0 2px 10px rgba(150,0,50,.32)}
#final-msg .big-line{font-size:1.55rem;font-weight:900;margin-bottom:4px}
#typewriter-cursor{
  display:inline-block;width:2px;height:1.15em;
  background:#fff;vertical-align:middle;margin-right:2px;
  animation:cursorBlink .7s step-end infinite;
}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Mobile ── */
@media(max-width:480px){
  #card{padding:28px 18px 26px}
  #question{font-size:1.5rem}
  #bear-svg,#final-bear-svg{width:155px;height:155px}
  #final-msg p{font-size:.97rem}
  #final-msg .big-line{font-size:1.2rem}
  #final-msg{padding:22px 22px}
  #music-btn{font-size:.82rem;padding:6px 14px}
  #no-counter{font-size:.78rem;padding:5px 12px}
}
@media(max-width:360px){
  #bear-svg,#final-bear-svg{width:130px;height:130px}
  #question{font-size:1.3rem}
}
</style>
</head>
<body>

<div id="particles-bg"></div>
<div id="hearts-bg"></div>

<button id="music-btn" onclick="toggleMusic()">🎵 موسيقى ON</button>
<div id="no-counter">لا × <span id="no-count-num">0</span></div>
<div id="welcome-back"></div>

<div id="card">
  <div id="bear-container">
    <svg id="bear-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="45%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#d4956a"/>
          <stop offset="100%" stop-color="#a0622e"/>
        </radialGradient>
        <radialGradient id="faceGrad" cx="45%" cy="38%" r="52%">
          <stop offset="0%" stop-color="#e8ab7a"/>
          <stop offset="100%" stop-color="#c07040"/>
        </radialGradient>
        <radialGradient id="bellyGrad" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#f5d4b0"/>
          <stop offset="100%" stop-color="#e0b080"/>
        </radialGradient>
        <radialGradient id="earInnerGrad" cx="50%" cy="50%" r="55%">
          <stop offset="0%" stop-color="#f0b090"/>
          <stop offset="100%" stop-color="#d08050"/>
        </radialGradient>
        <radialGradient id="eyeGrad" cx="35%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#5a3010"/>
          <stop offset="100%" stop-color="#2a1208"/>
        </radialGradient>
        <filter id="softShadow" x="-10%" y="-5%" width="120%" height="120%">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(120,60,20,.25)"/>
        </filter>
      </defs>

      <!-- BODY -->
      <ellipse cx="100" cy="148" rx="44" ry="38" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
      <ellipse cx="100" cy="152" rx="26" ry="22" fill="url(#bellyGrad)"/>
      <!-- ARMS -->
      <ellipse cx="58" cy="148" rx="15" ry="11" fill="#b87040" transform="rotate(-20,58,148)"/>
      <ellipse cx="142" cy="148" rx="15" ry="11" fill="#b87040" transform="rotate(20,142,148)"/>
      <ellipse cx="46" cy="157" rx="9" ry="7" fill="#d49060" transform="rotate(-15,46,157)"/>
      <ellipse cx="154" cy="157" rx="9" ry="7" fill="#d49060" transform="rotate(15,154,157)"/>
      <!-- LEGS -->
      <ellipse cx="78" cy="180" rx="18" ry="10" fill="#b07030"/>
      <ellipse cx="122" cy="180" rx="18" ry="10" fill="#b07030"/>
      <ellipse cx="78" cy="185" rx="14" ry="7" fill="#c98848"/>
      <ellipse cx="122" cy="185" rx="14" ry="7" fill="#c98848"/>
      <!-- EARS -->
      <circle cx="68" cy="54" r="20" fill="url(#bodyGrad)"/>
      <circle cx="132" cy="54" r="20" fill="url(#bodyGrad)"/>
      <circle cx="68" cy="55" r="12" fill="url(#earInnerGrad)"/>
      <circle cx="132" cy="55" r="12" fill="url(#earInnerGrad)"/>
      <!-- HEAD -->
      <circle cx="100" cy="95" r="54" fill="url(#faceGrad)" filter="url(#softShadow)"/>
      <!-- MUZZLE -->
      <ellipse cx="100" cy="116" rx="22" ry="15" fill="url(#bellyGrad)"/>
      <!-- NOSE -->
      <ellipse cx="100" cy="109" rx="9" ry="6" fill="#5a2a0a"/>
      <ellipse cx="98" cy="107.5" rx="3" ry="2" fill="rgba(255,255,255,.35)"/>

      <!-- MOUTH states -->
      <g id="mouth-happy">
        <path d="M89 116 Q100 126 111 116" stroke="#5a2a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
      <g id="mouth-sad" opacity="0">
        <path d="M89 122 Q100 114 111 122" stroke="#5a2a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
      <g id="mouth-happy-big" opacity="0">
        <path d="M86 115 Q100 130 114 115" stroke="#5a2a0a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <path d="M88 116 Q100 128 112 116" fill="rgba(255,150,150,.4)" stroke="none"/>
      </g>

      <!-- EYES -->
      <g id="eye-left">
        <circle cx="80" cy="88" r="12" fill="url(#eyeGrad)"/>
        <circle cx="80" cy="88" r="8.5" fill="#1a0800"/>
        <circle cx="83.5" cy="84.5" r="3.2" fill="white" class="bear-eye-shine"/>
        <circle cx="77.5" cy="90" r="1.5" fill="rgba(255,255,255,.5)"/>
      </g>
      <g id="eye-right">
        <circle cx="120" cy="88" r="12" fill="url(#eyeGrad)"/>
        <circle cx="120" cy="88" r="8.5" fill="#1a0800"/>
        <circle cx="123.5" cy="84.5" r="3.2" fill="white" class="bear-eye-shine"/>
        <circle cx="117.5" cy="90" r="1.5" fill="rgba(255,255,255,.5)"/>
      </g>

      <!-- Blink layer (covers eyes) -->
      <g id="bear-blink">
        <rect x="64" y="83" width="32" height="14" rx="7" fill="url(#faceGrad)" opacity="0"/>
      </g>

      <!-- Puppy eyes overlay -->
      <g id="puppy-eyes" opacity="0">
        <circle cx="80" cy="89" r="9.5" fill="#0d0400"/>
        <circle cx="120" cy="89" r="9.5" fill="#0d0400"/>
        <circle cx="83" cy="85" r="4" fill="white"/>

function vibratePhone(n){

// ════════════════════════════════════════════
//  MUSIC (Web Audio)
// ════════════════════════════════════════════
function startMusic(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ctx=audioCtx,master=ctx.createGain();
  master.gain.value=.14;master.connect(ctx.destination);
  const melody=[261.63,329.63,392,440,392,329.63,261.63,220];
  const harmony=[329.63,392,493.88,523.25,493.88,392,329.63,293.66];
  const bpm=72,beat=60/bpm;
  function note(freq,start,dur,vol){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,start);
    g.gain.linearRampToValueAtTime(vol||.45,start+.05);
    g.gain.linearRampToValueAtTime(0,start+dur-.05);
    o.connect(g);g.connect(master);
    o.start(start);o.stop(start+dur);
    musicNodes.push(o);
  }
  function loop(offset){
    melody.forEach((f,i)=>note(f,ctx.currentTime+offset+i*beat,beat*.88));
    harmony.forEach((f,i)=>note(f,ctx.currentTime+offset+i*beat,beat*.72,.28));
  }
  let t=0;for(let b=0;b<42;b++){loop(t);t+=melody.length*beat;}
}
function stopMusic(){
  musicNodes.forEach(n=>{try{n.stop()}catch(e){}});
  musicNodes=[];
}
function toggleMusic(){
  musicOn=!musicOn;
  const btn=document.getElementById('music-btn');
  if(musicOn){
    startMusic();
    btn.textContent='🎵 موسيقى OFF';
    btn.classList.add('playing');
  }else{
    stopMusic();
    btn.textContent='🎵 موسيقى ON';
    btn.classList.remove('playing');
  }
}

// ════════════════════════════════════════════
const finalLines=[
  {id:'tw-line1', cls:'big-line', text:'😂😂 عرفت إلي إنتي تحبني ❤️'},
  {id:'tw-line2', cls:'',         text:'أما بصراحة...'},
  {id:'tw-line3', cls:'',         text:'إنتي أغلى إنسان في الدنيا 🌹'},
  {id:'tw-line4', cls:'',         text:'ربي يديمك في حياتي ❤️'},
];
function typewriterAll(){
  let lineIdx=0,charIdx=0;
  const cursor=document.createElement('span');
  cursor.id='typewriter-cursor';

  function typeNext(){
    if(lineIdx>=finalLines.length){cursor.remove();return;}
    const {id,cls,text}=finalLines[lineIdx];
    const el=document.getElementById(id);
    if(cls) el.className=cls;
    if(charIdx===0){cursor.remove();el.appendChild(cursor);}
    if(charIdx<text.length){
      // handle emoji (multi-char code points)
      const remaining=text.slice(charIdx);
      const cp=[...remaining][0];
      el.insertBefore(document.createTextNode(cp),cursor);
      charIdx+=cp.length;
      setTimeout(typeNext,charIdx===1?350:45+Math.random()*30);
    }else{
      lineIdx++;charIdx=0;
      setTimeout(typeNext,380);
    }
  }
  setTimeout(typeNext,600);
}

// ════════════════════════════════════════════
//  "إييي" HANDLER
// ════════════════════════════════════════════
function onYes(){
  if(yesClicked) return;
  yesClicked=true;

  setBearVeryHappy();
  jumpBear();

  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const r=document.getElementById('yes-btn').getBoundingClientRect();
  const bx=r.left+r.width/2,by=r.top+r.height/2;

  // Rings
  spawnRing(bx,by);
  setTimeout(()=>spawnRing(cx,cy*.6),200);
  setTimeout(()=>spawnRing(cx,cy),400);

  // Confetti wave
  launchConfetti(160);
  setTimeout(()=>launchConfetti(80),800);

  // Heart explosions
  launchHeartExplosion(cx,cy,30);
  setTimeout(()=>launchHeartExplosion(bx,by,20),350);
  setTimeout(()=>launchHeartExplosion(cx,cy*.35,24),650);
  setTimeout(()=>launchHeartExplosion(cx*.2,cy*.5,16),900);
  setTimeout(()=>launchHeartExplosion(cx*1.8,cy*.5,16),1050);

  // Music
  if(!musicOn){
    musicOn=true;startMusic();
    const b=document.getElementById('music-btn');
    b.textContent='🎵 موسيقى OFF';b.classList.add('playing');
  }

  // Save to localStorage
  localStorage.setItem('loveAnswer','yes');
  localStorage.setItem('loveVisited','yes');

  // Final screen + typewriter
  setTimeout(()=>{
    const fs=document.getElementById('final-screen');
    fs.classList.add('show');
    document.getElementById('final-bear-svg').classList.add('bouncing');
    typewriterAll();
  },1000);
}
</script>
